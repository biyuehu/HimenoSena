name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2

      - name: Build project
        run: deno task build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: himeno-sena
          path: build
