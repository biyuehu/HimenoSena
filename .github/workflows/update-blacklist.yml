name: Update Blacklist

on:
  push:
    branches: [main]
    paths:
      - "data/blacklist.raw.json"
      - "scripts/update-blacklist.ts"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Update blacklist names
        run: deno task black

      - name: Commit updated blacklist
        run: |
          if git diff --quiet -- data/blacklist.json; then
            echo "No blacklist changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/blacklist.json
          git commit -m "chore: update blacklist names [skip ci]"
          git push
