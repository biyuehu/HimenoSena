name: Validate JSON
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "data/**/*.json"
      - "scripts/update-blacklist.ts"

permissions:
  pull-requests: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Validate JSON format
        id: validate-json
        run: |
          jq empty data/messages.json
          jq empty data/blacklist.raw.json
          jq empty data/blacklist.json

      - name: Check blacklist generator
        run: deno task black

      - name: Close PR and comment
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            -d '{"body":"@${{ github.event.pull_request.user.login }} JSON format is not valid. Please check data/messages.json and data/blacklist.raw.json."}'

          curl -X PATCH \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}" \
            -d '{"state":"closed"}'
